<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BERT 챗봇</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/qna"></script>
</head>
<body>
    <h1>BERT 기반 Q&A 시스템</h1>
    <textarea id="context" rows="5" cols="50" placeholder="여기에 문맥을 입력하세요"></textarea><br>
    <input type="text" id="question" placeholder="질문을 입력하세요">
    <button onclick="answerQuestion()">답변하기</button>
    <h2>답변: <span id="answer"></span></h2>

    <script>
        let model;

        async function loadModel() {
            console.log("모델을 로드하는 중...");
            model = await qna.load();
            console.log("BERT 모델 로드 완료!");
        }

        async function answerQuestion() {
            if (!model) {
                alert("아직 모델이 로드되지 않았습니다!");
                return;
            }
            const context = document.getElementById("context").value;
            const question = document.getElementById("question").value;

            const answers = await model.findAnswers(question, context);
            console.log(answers);
            if (answers.length > 0) {
                document.getElementById("answer").innerText = answers[0].text;
            } else {
                document.getElementById("answer").innerText = "답변을 찾을 수 없습니다.";
            }
        }

        loadModel();
    </script>
</body>
</html>
