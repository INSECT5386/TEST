<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chatbot</title>
  <style>
    .chat-container {
      width: 400px;
      height: 500px;
      border: 1px solid #ccc;
      padding: 10px;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .message {
      padding: 5px;
      margin: 5px;
      border-radius: 5px;
      background-color: #f0f0f0;
    }
    .message.user {
      background-color: #d3f8d3;
      align-self: flex-end;
    }
    .message.bot {
      background-color: #f1f1f1;
      align-self: flex-start;
    }
    input[type="text"] {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="chat-container" id="chat-container"></div>
  <input type="text" id="user-input" placeholder="Type a message..." onkeydown="if(event.key === 'Enter'){ sendMessage(); }">

  <script>
    const url = "https://yuchan5386-naturaai-space.hf.space/run/predict";  // 정확한 API URL

    // 메시지 추가 함수
    function addMessage(text, sender) {
      const chatContainer = document.getElementById('chat-container');
      const message = document.createElement('div');
      message.className = `message ${sender}`;
      message.innerText = text;
      chatContainer.appendChild(message);
      chatContainer.scrollTop = chatContainer.scrollHeight;  // 자동 스크롤
    }

    // 사용자 메시지 처리 함수
    function sendMessage() {
      const userInput = document.getElementById('user-input').value;
      if (userInput.trim() === "") return;
      
      // 사용자 메시지 화면에 출력
      addMessage(userInput, 'user');
      
      // API 호출하여 챗봇 응답 가져오기
      fetch(url, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({ data: [userInput] })
      })
      .then(response => response.json())
      .then(data => {
        const botResponse = data.data ? data.data[0] : "I didn't get that!";
        addMessage(botResponse, 'bot');  // 챗봇 응답 화면에 출력
      })
      .catch(error => {
        console.error("Error:", error);
        addMessage("Sorry, something went wrong!", 'bot');
      });

      // 입력창 초기화
      document.getElementById('user-input').value = '';
    }
  </script>

</body>
</html>
