<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ONNX.js Model Load Test</title>
  <script src="https://cdn.jsdelivr.net/npm/onnxjs@1.0.0/dist/onnx.min.js"></script>
</head>
<body>
  <h1>ONNX.js Model Inference</h1>

  <script>
    async function loadAndRunModel() {
      try {
        // ONNX 세션 생성
        const session = new onnx.InferenceSession();

        // 모델 로드 (Raw URL 사용)
        await session.loadModel('https://raw.githubusercontent.com/INSECT5386/TEST/main/model_int8.onnx');  // 모델 파일 Raw URL

        // 예시 입력 데이터를 텐서로 변환
        const inputTensor = new onnx.Tensor(new Float32Array([1, 2, 3, 4]), 'float32', [1, 4]);

        // 모델 실행
        const outputMap = await session.run([inputTensor]);

        // 출력 결과
        console.log('Output:', outputMap);
      } catch (error) {
        console.error('Error loading or running the model:', error);
      }
    }

    loadAndRunModel();
  </script>
</body>
</html>
