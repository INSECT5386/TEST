<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hugging Face API 테스트</title>
</head>
<body>
    <h1>Hugging Face API 테스트</h1>
    <input type="text" id="userInput" placeholder="메시지를 입력하세요">
    <button onclick="sendMessage()">전송</button>
    <p>응답: <span id="responseText">없음</span></p>
    <p>오류: <span id="errorText">없음</span></p>

    <script>
        async function getAIResponse(inputText) {
            try {
                const response = await fetch("https://your-vercel-app.vercel.app/api/huggingface", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ input: inputText })
                });

                if (!response.ok) {
                    throw new Error(`서버 오류: ${response.status} ${response.statusText}`);
                }

                return await response.json();
            } catch (error) {
                throw new Error(`네트워크 오류: ${error.message}`);
            }
        }

        function sendMessage() {
            const userInput = document.getElementById("userInput").value;
            const responseText = document.getElementById("responseText");
            const errorText = document.getElementById("errorText");

            responseText.textContent = "응답 중...";
            errorText.textContent = "없음";

            getAIResponse(userInput)
                .then(response => {
                    responseText.textContent = JSON.stringify(response);
                })
                .catch(error => {
                    console.error(error);
                    errorText.textContent = error.message;
                    responseText.textContent = "오류 발생!";
                });
        }
    </script>
</body>
</html>
