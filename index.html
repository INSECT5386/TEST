<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NaturaAI - Hugging Face API 호출</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f4f4f4;
    }
    h1 {
      text-align: center;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background-color: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }
    textarea {
      width: 100%;
      height: 100px;
      margin-bottom: 10px;
      padding: 10px;
      font-size: 16px;
      border-radius: 4px;
      border: 1px solid #ddd;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #007bff;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      background-color: #0056b3;
    }
    .result {
      margin-top: 20px;
      padding: 10px;
      background-color: #e9ecef;
      border-radius: 4px;
      word-wrap: break-word;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>NaturaAI 테스트</h1>
    <textarea id="inputText" placeholder="텍스트를 입력하세요..."></textarea>
    <button onclick="sendRequest()">요청 보내기</button>
    <div id="responseResult" class="result"></div>
  </div>

  <script>
    async function sendRequest() {
      const inputText = document.getElementById('inputText').value;
      const responseResult = document.getElementById('responseResult');

      // 빈 텍스트가 입력되면 경고
      if (!inputText.trim()) {
        responseResult.textContent = '입력값을 제공해주세요.';
        return;
      }

      responseResult.textContent = '요청 중...';

      try {
        const response = await fetch('https://serverless-theta-two.vercel.app/api/handler', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            inputs: inputText
          })
        });

        if (response.ok) {
          const data = await response.json();
          responseResult.textContent = `API 응답: ${JSON.stringify(data, null, 2)}`;
        } else {
          responseResult.textContent = `오류 발생: ${response.statusText}`;
        }
      } catch (error) {
        responseResult.textContent = `네트워크 오류: ${error.message}`;
      }
    }
  </script>
</body>
</html>
