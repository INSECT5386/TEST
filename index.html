<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transformer.js NLP Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/transformers.js"></script>
</head>
<body>
    <h1>Transformer.js NLP Demo</h1>
    <label for="inputText">Enter Text:</label>
    <input type="text" id="inputText" placeholder="Enter some text">
    <button onclick="runModel()">Run Model</button>

    <h2>Model Output:</h2>
    <pre id="output"></pre>

    <script>
        let model, tokenizer;

        async function loadModel() {
            // Load the BERT model and tokenizer
            model = await transformers.AutoModel.fromPretrained('bert-base-uncased');
            tokenizer = await transformers.AutoTokenizer.fromPretrained('bert-base-uncased');
            console.log("Model and tokenizer loaded!");
        }

        async function runModel() {
            const inputText = document.getElementById('inputText').value;

            if (inputText.trim() === '') {
                alert('Please enter some text!');
                return;
            }

            // Tokenize the input text
            const inputs = tokenizer.encode(inputText);

            // Run the model with the tokenized input
            const output = await model(inputs);

            // Display the output
            document.getElementById('output').textContent = JSON.stringify(output, null, 2);
        }

        // Load the model when the page is loaded
        loadModel();
    </script>
</body>
</html>
