<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONNX Model with GitHub Pages</title>
    <script src="https://cdn.jsdelivr.net/npm/onnxjs"></script>
</head>
<body>
    <h1>ONNX Model Example on GitHub Pages</h1>
    <div id="output"></div>

    <script>
        async function loadModel() {
            const modelUrl = 'https://insect5386.github.io/TEST/model.onnx'; // 모델 파일 URL
            const session = new onnx.InferenceSession();
            await session.loadModel(modelUrl);

            const input = new onnx.Tensor(new Float32Array([/* 입력 데이터 */]), 'float32', [1, 3]);
            const output = await session.run([input]);
            document.getElementById('output').innerHTML = 'Output: ' + output;
        }

        loadModel();
    </script>
</body>
</html>
