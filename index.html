<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hugging Face API 테스트</title>
</head>
<body>
    <h1>Hugging Face API 테스트</h1>
    <input type="text" id="userInput" placeholder="메시지를 입력하세요">
    <button onclick="sendMessage()">전송</button>
    <p>응답: <span id="responseText">없음</span></p>

    <script>
        async function getAIResponse(inputText) {
            const response = await fetch("https://natura-link.vercel.app/api/huggingface", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ input: inputText })
            });

            const result = await response.json();
            return result;
        }

        function sendMessage() {
            const userInput = document.getElementById("userInput").value;
            const responseText = document.getElementById("responseText");

            responseText.textContent = "응답 중...";

            getAIResponse(userInput)
                .then(response => {
                    responseText.textContent = JSON.stringify(response);
                })
                .catch(error => {
                    console.error(error);
                    responseText.textContent = "오류 발생!";
                });
        }
    </script>
</body>
</html>
