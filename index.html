<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TFLite Chatbot</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.0.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-tflite"></script>
</head>
<body>
    <h1>TensorFlow.js with TFLite Model</h1>
    <input type="text" id="userInput" placeholder="Type your message" />
    <button onclick="predictResponse()">Send</button>
    <div id="response"></div>

    <script>
        let tfliteModel;

        // TFLite 모델 로드
        async function loadModel() {
            tfliteModel = await tf.loadTFLiteModel('your_model.tflite');
            console.log("Model loaded successfully");
        }

        // 사용자가 입력한 텍스트를 모델에 입력하여 예측을 실행하는 함수
        async function predictResponse() {
            const userInput = document.getElementById('userInput').value;
            
            // 텍스트 입력을 텐서로 변환 (예시로 입력 텍스트를 배열로 변환)
            const inputTensor = tf.tensor([userInput.split('').map(c => c.charCodeAt(0))]);

            // 모델 예측
            const output = await tfliteModel.predict(inputTensor);

            // 예측 결과 처리 (예시: 출력 텐서를 텍스트로 변환)
            const response = output.dataSync();
            document.getElementById('response').innerText = `Model response: ${String.fromCharCode(...response)}`;
        }

        // 모델 로드 호출
        loadModel();
    </script>
</body>
</html>
