<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONNX.js Chatbot</title>

    <!-- ONNX.js CDN 추가 -->
    <script src="https://unpkg.com/onnxjs@1.5.1/dist/onnx.min.js"></script>
</head>
<body>
    <h1>ONNX.js Chatbot</h1>
    
    <div>
        <textarea id="inputText" rows="4" cols="50" placeholder="Type a message..."></textarea><br><br>
        <button id="sendButton">Send</button>
    </div>
    
    <div>
        <h2>Response:</h2>
        <p id="responseText"></p>
    </div>

    <script>
        async function runChatbot() {
            // onnx.js가 로드된 후 실행하도록 수정
            const session = new onnx.InferenceSession();
            await session.loadModel("/assets/model.onnx"); // GPT 모델 로드

            // 사용자 입력
            const userInput = document.getElementById("inputText").value;

            // 입력 텍스트를 모델이 이해할 수 있는 형식으로 변환 (예시)
            const input_tensor = new onnx.Tensor(new TextEncoder().encode(userInput), 'string', [1, userInput.length]);

            // 모델 실행
            const output = await session.run([input_tensor]);

            // 결과 출력 (가공된 텍스트를 반환한다고 가정)
            const response = output.values().next().value.data;
            document.getElementById("responseText").innerText = new TextDecoder().decode(response);
        }

        // 이벤트 리스너 (전송 버튼 클릭)
        document.getElementById("sendButton").addEventListener("click", runChatbot);
    </script>
</body>
</html>
