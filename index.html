<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transformers.js Example</title>
  <script type="module">
    import { GPT2LMHeadModel, GPT2Tokenizer } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@4.3.0/dist/transformers.esm.js';
  </script>
</head>
<body>
  <h1>Transformers.js 예시</h1>
  <div>
    <p><strong>입력 문장:</strong> <span id="input-text">Hello, how are you?</span></p>
    <p><strong>생성된 문장:</strong> <span id="generated-text">Loading...</span></p>
  </div>
  <script type="module">
    async function runModel() {
      const model = await GPT2LMHeadModel.fromPretrained('gpt2');
      const tokenizer = await GPT2Tokenizer.fromPretrained('gpt2');

      const inputText = 'Hello, how are you?';
      const encoded = await tokenizer.encode(inputText);
      
      const output = await model.generate(encoded, { max_length: 50 });
      const decodedOutput = await tokenizer.decode(output[0]);

      document.getElementById('generated-text').innerText = decodedOutput;
    }

    runModel();
  </script>
</body>
</html>
