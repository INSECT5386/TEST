<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONNX.js Demo</title>
</head>
<body>
    <h1>ONNX.js Model Inference</h1>
    <div>
        <p>Loading model...</p>
    </div>

    <!-- ONNX.js CDN 링크 -->
    <script src="https://unpkg.com/onnxjs@1.5.1/dist/onnx.min.js"></script>
    <script>
        async function runInference() {
            const session = new onnx.InferenceSession();
            await session.loadModel("/assets/model.onnx");  // 모델 경로

            // 예시 입력 데이터 (여기서는 1x3x224x224 크기)
            const input_data = new Float32Array(1 * 3 * 224 * 224); // 실제 입력 데이터를 여기에 넣으세요
            const input_tensor = new onnx.Tensor(input_data, 'float32', [1, 3, 224, 224]);

            // 모델 추론 실행
            const output = await session.run([input_tensor]);

            // 결과 출력
            console.log(output);
            alert("Inference finished! Check console for results.");
        }

        runInference();
    </script>
</body>
</html>
