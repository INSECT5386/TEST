<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BERT with TensorFlow.js</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-models"></script>
</head>
<body>
  <h1>BERT 모델 사용 예시</h1>
  <div>
    <p><strong>입력 문장:</strong> <span id="input-text">BERT is amazing!</span></p>
    <p><strong>예측 결과:</strong> <span id="prediction">Loading...</span></p>
  </div>
  
  <script>
    async function loadModel() {
      // TensorFlow.js로 BERT 모델 로드
      const model = await tf.loadGraphModel('https://tfhub.dev/google/bert_uncased_L-12_H-768_A-12/1');
      
      // 예시 문장
      const inputText = "BERT is amazing!";
      
      // BERT 토크나이저로 텍스트 변환
      const tokenizer = await tf.text.BertTokenizer.fromPretrained('bert-base-uncased');
      const inputIds = tokenizer.encode(inputText);
      
      // 예측
      const output = await model.predict(inputIds);
      
      // 예측 결과 출력
      document.getElementById('prediction').innerText = output;
    }
    
    loadModel();
  </script>
</body>
</html>
